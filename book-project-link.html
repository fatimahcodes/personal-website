<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fatimah Abubakar | Premium Book Store</title>

<!-- Tailored styles -->
<style>
:root {
  --bg:#f4f4f4;
  --text:#000;
  --card:#fff;
  --primary:#4a90e2;
  --secondary:#357ab8;
}

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

.dark {
  --bg:#1e1e1e;
  --text:#fff;
  --card:#2c2c2c;
}

header {
  background:var(--primary);
  color:white;
  padding:1.5rem;
  position:relative;
  text-align:center;
}

#darkToggle { position:absolute; left:15px; top:15px; cursor:pointer; }
#cart { position:absolute; right:15px; top:15px; cursor:pointer; }

input { padding:0.5rem; width:200px; border-radius:5px; border:none; margin-top:0.5rem; }
.filters button { margin:5px; padding:0.5rem 1rem; border:none; border-radius:5px; background:var(--primary); color:white; cursor:pointer; transition:0.2s;}
.filters button.active { background:#e94e77; }
.filters button:hover { transform:scale(1.05); }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1rem;
  padding:1rem;
}

.book {
  background:var(--card);
  padding:1rem;
  border-radius:10px;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  position:relative;
  transition:0.3s;
}
.book:hover { transform:translateY(-5px); box-shadow:0 8px 20px rgba(0,0,0,0.2);}
.book img { width:100%; border-radius:8px; transition: transform 0.3s;}
.book img:hover { transform:scale(1.05);}
.book button { width:100%; margin-top:5px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer; transition:0.3s;}
.book button:hover { opacity:0.85; transform:scale(1.05);}
.like-btn { position:absolute; top:10px; right:10px; background:transparent; border:none; cursor:pointer; font-size:1.2rem; transition:0.2s; }
.like-btn.liked { color:#e94e77; transform:scale(1.3); }

#cartBox, #checkoutBox {
  position:fixed; right:10px; top:70px; width:350px;
  background:var(--card); padding:1rem; display:none;
  border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.2);
  max-height:80vh; overflow-y:auto;
}

#cartList li { transition: all 0.3s ease; }

footer { background:#333; color:white; padding:1rem; text-align:center;}
footer a { color:white; margin:0 0.5rem; text-decoration:none;}
footer a:hover { text-decoration:underline;}

.star { color:gold; font-size:1rem; margin:0 1px; }

.recommendations { padding:1rem; background:var(--card); margin:1rem; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.recommendations h3 { margin-bottom:0.5rem; }

@media(max-width:600px){
  input { width:90%; margin-top:10px; }
  header { padding:1rem;}
  #cart, #darkToggle { position:static; margin:5px;}
  .grid { grid-template-columns:1fr;}
  #cartBox, #checkoutBox { width:90%; top:70px; }
}
</style>
</head>

<body>

<header>
<button id="darkToggle">🌙</button>
<h2>Fatimah Premium Book Store</h2>
<p>Contact: 08074850779 | Email: abubakarfatimah240@gmail.com</p>

<input id="search" placeholder="Search books...">

<div class="filters">
<button data="All" class="active">All</button>
<button data="Storybook">Storybooks</button>
<button data="Learning">Learning</button>
<button data="Travel">Travel</button>
</div>

<button id="cart">Cart (0)</button>
</header>

<div class="grid" id="books"></div>

<div class="recommendations" id="recommendations">
<h3>Recommended for You:</h3>
<div id="recGrid" class="grid"></div>
</div>

<!-- Cart Box -->
<div id="cartBox">
<h3>Your Cart</h3>
<ul id="list"></ul>
<p id="total"></p>
<button onclick="showCheckout()">Checkout</button>
</div>

<!-- Checkout Box -->
<div id="checkoutBox">
<h3>Checkout</h3>
<form id="checkoutForm">
<label>Name:</label><br>
<input type="text" id="customerName" required><br>
<label>Email:</label><br>
<input type="email" id="customerEmail" required><br>
<label>Phone:</label><br>
<input type="tel" id="customerPhone" required><br><br>
<h4>Order Summary</h4>
<ul id="checkoutList"></ul>
<p id="checkoutTotal"></p>
<button type="submit">Pay Now 💳</button>
<button type="button" onclick="closeCheckout()">Cancel</button>
</form>
</div>

<footer>
<p>© 2026 Fatimah Abubakar</p>
<p><a href="#">Instagram</a> | <a href="#">WhatsApp</a></p>
</footer>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
// -------------------- DATA --------------------
let data=[], cart=[];
const booksEl = document.getElementById("books");
const search = document.getElementById("search");
const list = document.getElementById("list");
const total = document.getElementById("total");
const cartBtn = document.getElementById("cart");
const checkoutBox = document.getElementById("checkoutBox");
let category="All";

// Replace these with your local images
const sampleBooks=[
  {title:"The Alchemist",img:"images/the-alchemist.jpg"},
  {title:"1984",img:"images/1984.jpg"},
  {title:"Atomic Habits",img:"images/atomic-habits.jpg"},
  {title:"To Kill a Mockingbird",img:"images/to-kill-a-mockingbird.jpg"},
  {title:"Pride and Prejudice",img:"images/pride-and-prejudice.jpg"},
  {title:"Harry Potter",img:"images/harry-potter1.jpg"},
  {title:"The Lord of the Rings",img:"images/lotr.jpg"},
  {title:"The Great Gatsby",img:"images/the-great-gatsby.jpg"},
  {title:"Thinking Fast and Slow",img:"images/thinking-fast-slow.jpg"},
  {title:"The Hobbit",img:"images/the-hobbit.jpg"}
];

const dynamicDesc = [
  "A thrilling story awaits!",
  "Learn something new today!",
  "Travel to amazing places!",
  "An exciting adventure!",
  "Discover hidden knowledge!",
  "Perfect for curious minds!",
  "A fun read for everyone!",
  "Expand your imagination!",
  "Explore new horizons!",
  "Dive into learning!"
];

const categories=["Storybook","Learning","Travel"];
// Generate sample data
for(let i=0;i<20;i++){
  const book = sampleBooks[i % sampleBooks.length];
  data.push({
    id:i,
    t: book.title,
    c: categories[Math.floor(Math.random()*categories.length)],
    img: book.img,
    p: Math.floor(Math.random()*15)+5,
    desc: dynamicDesc[i % dynamicDesc.length],
    likes:Math.floor(Math.random()*100),
    rating: Math.floor(Math.random()*5)+1
  });
}

// -------------------- RENDER --------------------
function render(){
  booksEl.innerHTML="";
  data.filter(b=>(category==="All"||b.c===category)&&b.t.toLowerCase().includes(search.value.toLowerCase()))
  .forEach(b=>{
    const d=document.createElement("div");
    d.className="book";
    
    let stars="";
    for(let s=0;s<b.rating;s++) stars+="⭐";
    
    d.innerHTML=`
      <img src="${b.img}" id="img-${b.id}" alt="${b.t}">
      <h4>${b.t}</h4>
      <p>${b.desc} - $${b.p}</p>
      <p>${stars}</p>
      <button onclick='add(${JSON.stringify(b)})'>Add to Cart</button>
      <button class="like-btn" id="like-${b.id}" onclick="likeBook(${b.id})">❤️ ${b.likes}</button>
    `;
    booksEl.appendChild(d);
  });
  renderRecommendations();
}

// -------------------- LIKES --------------------
function likeBook(id){
  const book = data.find(b=>b.id===id);
  book.likes++;
  const btn = document.getElementById(`like-${id}`);
  btn.textContent=`❤️ ${book.likes}`;
  btn.classList.add("liked");
  setTimeout(()=>btn.classList.remove("liked"),300);
  renderRecommendations();
}

// -------------------- CART --------------------
function add(b){
  let found = cart.find(i=>i.t===b.t);
  if(found){found.q++;}
  else{b.q=1; cart.push(b);}
  alert(b.t+" added to cart ✅");
  save(); update();
}

function update(){
  list.innerHTML="";
  let t=0;
  if(cart.length===0){ list.innerHTML="<p>No items yet</p>"; }
  cart.forEach((i,idx)=>{
    t+=i.p*i.q;
    const li = document.createElement("li");
    li.innerHTML=`${i.t} x${i.q} - $${i.p*i.q} <button onclick="remove(${idx})">x</button>`;
    list.appendChild(li);
  });
  total.textContent="Total: $"+t;
  let count = cart.reduce((sum,i)=>sum+i.q,0);
  cartBtn.textContent="Cart ("+count+")";
}

function remove(i){ cart.splice(i,1); save(); update(); }
function save(){ localStorage.setItem("cart",JSON.stringify(cart)); }

cartBtn.onclick=()=>{ 
  const box=document.getElementById("cartBox"); 
  box.style.display=box.style.display==="block"?"none":"block"; 
}

// -------------------- CHECKOUT --------------------
function showCheckout(){
  if(cart.length===0) return alert("Cart is empty");
  document.getElementById("checkoutList").innerHTML="";
  let t=0;
  cart.forEach(c=>{
    t+=c.q*c.p;
    const li=document.createElement("li");
    li.textContent=`${c.t} x${c.q} - $${c.p*c.q}`;
    document.getElementById("checkoutList").appendChild(li);
  });
  document.getElementById("checkoutTotal").textContent="Total: $"+t;
  checkoutBox.style.display="block";
}

function closeCheckout(){ checkoutBox.style.display="none"; }

document.getElementById("checkoutForm").onsubmit=function(e){
  e.preventDefault();
  payWithPaystack();
}

// -------------------- PAYSTACK PAYMENT --------------------
function payWithPaystack(){
  let email=document.getElementById("customerEmail").value;
  let t=cart.reduce((sum,i)=>sum+i.p*i.q,0)*100; // in kobo
  var handler = PaystackPop.setup({
    key: 'YOUR_PUBLIC_KEY', // replace with your paystack public key
    email: email,
    amount: t,
    currency: "NGN",
    callback: function(response){
      alert('Payment Successful! Reference: '+response.reference);
      cart=[]; update(); closeCheckout();
    },
    onClose: function(){
      alert('Payment window closed.');
    }
  });
  handler.openIframe();
}

// -------------------- SEARCH & FILTER --------------------
document.querySelectorAll(".filters button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    category=b.getAttribute("data");
    render();
  };
});
search.oninput=render;

// -------------------- DARK MODE --------------------
document.getElementById("darkToggle").onclick=()=>{
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",document.body.classList.contains("dark"));
};
if(localStorage.getItem("theme")==="true"){ document.body.classList.add("dark"); }

// -------------------- RECOMMENDATIONS --------------------
function renderRecommendations(){
  const recGrid=document.getElementById("recGrid");
  recGrid.innerHTML="";
  // simple AI: top liked + random from cart category
  let recommended = data.sort((a,b)=>b.likes-a.likes).slice(0,4);
  recommended.forEach(b=>{
    const d=document.createElement("div");
    d.className="book";
    let stars=""; for(let s=0;s<b.rating;s++) stars+="⭐";
    d.innerHTML=`
      <img src="${b.img}" alt="${b.t}">
      <h4>${b.t}</h4>
      <p>${b.desc}</p>
      <p>${stars}</p>
      <button onclick='add(${JSON.stringify(b)})'>Add to Cart</button>
    `;
    recGrid.appendChild(d);
  });
}

// -------------------- INITIAL RENDER --------------------
render(); update();
</script>

</body>
  </html>
