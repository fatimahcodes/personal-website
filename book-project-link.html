<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fatimah Abubakar | Book Store Project</title> 

<style>
:root {
  --bg:#f4f4f4;
  --text:#000;
  --card:#fff;
  --primary:#4a90e2;
}

.dark {
  --bg:#1e1e1e;
  --text:#fff;
  --card:#2c2c2c;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

header {
  background:var(--primary);
  color:white;
  padding:1.5rem;
  position:relative;
  text-align:center;
}

#cart, #darkToggle {
  position:absolute;
  top:15px;
}

#cart { right:15px; }
#darkToggle { left:15px; }

input {
  padding:0.5rem;
  width:200px;
  border-radius:5px;
  border:none;
}

.filters button {
  margin:5px;
  padding:0.5rem;
  border:none;
  border-radius:5px;
  background:var(--primary);
  color:white;
  cursor:pointer;
  transition:0.2s;
}

.filters button.active { background:#e94e77; }

button:hover {
  opacity:0.8;
  transform:scale(1.05);
}

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1rem;
  padding:1rem;
}

.book {
  background:var(--card);
  padding:1rem;
  border-radius:10px;
  transition:0.3s;
}

.book:hover {
  transform:translateY(-5px);
}

.book img { width:100%; }

.book button {
  width:100%;
  margin-top:5px;
  background:var(--primary);
  color:white;
}

#cartBox {
  position:fixed;
  right:10px;
  top:70px;
  background:var(--card);
  padding:1rem;
  width:250px;
  display:none;
  border-radius:10px;
}

footer {
  background:#333;
  color:white;
  padding:1rem;
  text-align:center;
}

/* MOBILE FIX */
@media(max-width:600px){
  input {
    width:90%;
    margin-top:10px;
  }

  header {
    padding:1rem;
  }

  #cart, #darkToggle {
    position:static;
    margin:5px;
  }
}
</style>
</head>

<body>

<header>
<button id="darkToggle">🌙</button>
<h2>Fatimah Book Store</h2>

<input id="search" placeholder="Search books...">

<div class="filters">
<button data="All" class="active">All</button>
<button data="Storybook">Storybooks</button>
<button data="Learning">Learning</button>
<button data="Travel">Travel</button>
</div>

<button id="cart">Cart (0)</button>
</header>

<div class="grid" id="books"></div>

<div id="cartBox">
<h3>Your Cart</h3>
<ul id="list"></ul>
<p id="total"></p>
<button onclick="checkout()">Checkout</button>
</div>

<footer>
<p>© 2026 Fatimah Abubakar</p>
<p>Contact: abubakarfatimah240@gmail.com</p>
<p>
<a href="#">Instagram</a> | 
<a href="#">WhatsApp</a>
</p>
</footer>

<script>
const data=[
{t:"Cat Adventures",c:"Storybook",p:10,img:"https://picsum.photos/200/300?1"},
{t:"Learning HTML",c:"Learning",p:12,img:"https://picsum.photos/200/300?2"},
{t:"Travel Stories",c:"Travel",p:15,img:"https://picsum.photos/200/300?3"},
{t:"Mystery Novel",c:"Storybook",p:11,img:"https://picsum.photos/200/300?4"},
{t:"Science for Kids",c:"Learning",p:9,img:"https://picsum.photos/200/300?5"}
];

let cart=JSON.parse(localStorage.getItem("cart"))||[];
let cat="All";

const books=document.getElementById("books");
const search=document.getElementById("search");
const list=document.getElementById("list");
const total=document.getElementById("total");
const cartBtn=document.getElementById("cart");

function render(){
books.innerHTML="";
data.filter(b=>
(cat==="All"||b.c===cat)&&
b.t.toLowerCase().includes(search.value.toLowerCase())
).forEach(b=>{
let d=document.createElement("div");
d.className="book";
d.innerHTML=`
<img src="${b.img}">
<h4>${b.t}</h4>
<p>$${b.p}</p>
<button onclick='add(${JSON.stringify(b)})'>Add to Cart</button>
`;
books.appendChild(d);
});
}

function add(b){
let found=cart.find(i=>i.t===b.t);
if(found){found.q++;}
else{b.q=1;cart.push(b);}

alert(b.t + " added to cart ✅");

save();
update();
}

function update(){
list.innerHTML="";
let t=0;

if(cart.length===0){
  list.innerHTML="<p>No items yet</p>";
}

cart.forEach((i,idx)=>{
t+=i.p*i.q;
let li=document.createElement("li");
li.innerHTML=`${i.t} x${i.q} 
<button onclick="remove(${idx})">x</button>`;
list.appendChild(li);
});

total.textContent="Total: $"+t;

/* FIXED CART COUNT */
let count = cart.reduce((sum,i)=>sum+i.q,0);
cartBtn.textContent="Cart ("+count+")";
}

function remove(i){
cart.splice(i,1);
save();
update();
}

function save(){
localStorage.setItem("cart",JSON.stringify(cart));
}

document.querySelectorAll(".filters button").forEach(b=>{
b.onclick=()=>{
document.querySelectorAll(".filters button")
.forEach(x=>x.classList.remove("active"));
b.classList.add("active");
cat=b.getAttribute("data");
render();
};
});

search.oninput=render;

cartBtn.onclick=()=>{
let box=document.getElementById("cartBox");
box.style.display=box.style.display==="block"?"none":"block";
};

function checkout(){
if(cart.length===0)return alert("Empty cart");
alert("Order placed 🎉");
cart=[];
save();
update();
}

document.getElementById("darkToggle").onclick=()=>{
document.body.classList.toggle("dark");
localStorage.setItem("theme",document.body.classList.contains("dark"));
};

if(localStorage.getItem("theme")==="true"){
document.body.classList.add("dark");
}

render();
update();
</script>

</body>
                                       </html>
