<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fatimah Premium Book Store</title>
<style>
:root {
  --bg:#f4f4f4;
  --text:#000;
  --card:#fff;
  --primary:#ff9900;
  --accent:#007185;
}
body {
  margin:0;
  font-family:Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}
.dark {
  --bg:#131921;
  --text:#fff;
  --card:#232f3e;
}
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  background:var(--primary);
  color:white;
  padding:1rem 2rem;
}
header h2 { margin:0; font-size:1.5rem; }
header input { padding:0.5rem; border-radius:5px; border:none; width:200px; margin-right:0.5rem;}
header button { padding:0.5rem 1rem; border:none; border-radius:5px; cursor:pointer; margin-left:0.5rem; }
header .filters { margin-top:0.5rem; width:100%; }
header .filters button { margin:0.2rem; padding:0.5rem 1rem; border:none; border-radius:5px; background:var(--accent); color:white; cursor:pointer; }
header .filters button.active { background:var(--primary); color:#fff; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:1rem;
  padding:1rem;
}

.book {
  background:var(--card);
  border-radius:10px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  overflow:hidden;
  position:relative;
  transition:0.3s;
}
.book:hover { transform:translateY(-5px) scale(1.02); box-shadow:0 6px 20px rgba(0,0,0,0.2); }
.book img { width:100%; height:250px; object-fit:cover; display:block; }
.book .price-badge { position:absolute; top:10px; right:10px; background:var(--primary); color:#fff; padding:0.3rem 0.6rem; border-radius:5px; font-weight:bold;}
.book .stars { position:absolute; top:10px; left:10px; background:rgba(255,255,255,0.8); padding:0.2rem 0.4rem; border-radius:5px; font-size:0.9rem; }
.book-content { padding:0.8rem; }
.book-content h4 { margin:0 0 0.5rem 0; font-size:1rem; min-height:2.4em; }
.book-content p { font-size:0.85rem; min-height:2em; margin:0.2rem 0; }
.book-content button { width:100%; margin-top:0.3rem; background:var(--primary); color:white; border:none; border-radius:5px; padding:0.5rem; cursor:pointer; transition:0.2s; }
.book-content button:hover { background:var(--accent); }
.like-btn { position:absolute; bottom:10px; right:10px; background:transparent; border:none; font-size:1.2rem; cursor:pointer; }
.like-btn.liked { color:#e94e77; transform:scale(1.3); }

#cartBox, #checkoutBox {
  position:fixed; right:10px; top:70px; width:350px;
  background:var(--card); padding:1rem; display:none;
  border-radius:10px; box-shadow:0 4px 15px rgba(0,0,0,0.3);
  max-height:80vh; overflow-y:auto;
}
#cartList li { transition: all 0.3s ease; }

.recommendations { padding:1rem; background:var(--card); margin:1rem; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.recommendations h3 { margin-bottom:0.5rem; }

footer { background:#333; color:white; padding:1rem; text-align:center;}
footer a { color:white; margin:0 0.5rem; text-decoration:none;}
footer a:hover { text-decoration:underline;}
@media(max-width:600px){
  header input { width:90%; margin-top:10px; }
  header { padding:1rem;}
  .grid { grid-template-columns:1fr;}
  #cartBox, #checkoutBox { width:90%; top:70px; }
}
</style>
</head>
<body>

<header>
  <button id="darkToggle">🌙</button>
  <h2>Fatimah Book Store</h2>
  <div>
    <input id="search" placeholder="Search books...">
    <button id="cartBtn">Cart (0)</button>
  </div>
  <div class="filters">
    <button data="All" class="active">All</button>
    <button data="Storybook">Storybooks</button>
    <button data="Learning">Learning</button>
    <button data="Travel">Travel</button>
  </div>
</header>

<div class="grid" id="books"></div>

<div class="recommendations" id="recommendations">
  <h3>Recommended for You:</h3>
  <div id="recGrid" class="grid"></div>
</div>

<div id="cartBox">
  <h3>Your Cart</h3>
  <ul id="list"></ul>
  <p id="total"></p>
  <button onclick="showCheckout()">Checkout</button>
</div>

<div id="checkoutBox">
  <h3>Checkout</h3>
  <form id="checkoutForm">
    <label>Name:</label><br><input type="text" id="customerName" required><br>
    <label>Email:</label><br><input type="email" id="customerEmail" required><br>
    <label>Phone:</label><br><input type="tel" id="customerPhone" required><br><br>
    <h4>Order Summary</h4>
    <ul id="checkoutList"></ul>
    <p id="checkoutTotal"></p>
    <button type="submit">Pay Now 💳</button>
    <button type="button" onclick="closeCheckout()">Cancel</button>
  </form>
</div>

<footer>
  <p>© 2026 Fatimah Abubakar</p>
  <p><a href="#">Instagram</a> | <a href="#">WhatsApp</a></p>
</footer>

<script>
// -------------------- DATA --------------------
let data=[], cart=[];
const booksEl = document.getElementById("books");
const search = document.getElementById("search");
const list = document.getElementById("list");
const totalEl = document.getElementById("total");
const cartBtn = document.getElementById("cartBtn");
let category = "All";

// Sample books
const sampleBooks=[
  {title:"The Alchemist",img:"images/the alchemist.jpg"},
  {title:"1984",img:"images/1984.jpg"},
  {title:"Atomic Habits",img:"images/atomic habits.jpg"},
  {title:"Harry Potter",img:"images/harry potter.jpg"},
  {title:"The Lord of the Rings",img:"images/the lord of the rings.jpg"},
  {title:"Little Women",img:"images/little women.jpg"},
  {title:"Sapiens",img:"images/sapiens.jpg"},
  {title:"The Chronicles of Narnia",img:"images/the chronicles of narnia.jpg"},
  {title:"Moby Dick",img:"images/moby dick.jpg"},
  {title:"The Hobbit",img:"images/the hobbit.jpg"},
];

const dynamicDesc = [
  "A thrilling story awaits!",
  "Learn something new today!",
  "Travel to amazing places!",
  "An exciting adventure!",
  "Discover hidden knowledge!",
  "Perfect for curious minds!",
  "A fun read for everyone!",
  "Expand your imagination!",
  "Explore new horizons!",
  "Dive into learning!"
];

const categories=["Storybook","Learning","Travel"];
for(let i=0;i<sampleBooks.length;i++){
  const book = sampleBooks[i];
  data.push({
    id:i,
    t: book.title,
    c: categories[Math.floor(Math.random()*categories.length)],
    img: book.img,
    p: Math.floor(Math.random()*15)+5,
    desc: dynamicDesc[i % dynamicDesc.length],
    likes:Math.floor(Math.random()*100),
    rating: Math.floor(Math.random()*5)+1
  });
}

// -------------------- FUNCTIONS --------------------
function render() {
  booksEl.innerHTML="";
  const searchValue = search.value.toLowerCase();
  data.filter(b => (category==="All"||b.c===category) && b.t.toLowerCase().includes(searchValue))
      .forEach(b=>{
        let stars="";
        for(let s=0;s<b.rating;s++) stars+="⭐";
        const d = document.createElement("div");
        d.className="book";
        d.innerHTML=`
          <img src="${b.img}" alt="${b.t}">
          <span class="price-badge">$${b.p}</span>
          <span class="stars">${stars}</span>
          <div class="book-content">
            <h4>${b.t}</h4>
            <p>${b.desc}</p>
            <button class="add-btn" data-id="${b.id}">Add to Cart</button>
            <button class="like-btn" id="like-${b.id}">❤️ ${b.likes}</button>
          </div>`;
        booksEl.appendChild(d);
      });

  document.querySelectorAll(".add-btn").forEach(btn=>{
    btn.onclick = ()=>{const id=parseInt(btn.getAttribute("data-id")); add(data.find(b=>b.id===id));};
  });
  document.querySelectorAll(".like-btn").forEach(btn=>{
    const id=parseInt(btn.id.split("-")[1]);
    btn.onclick = ()=>likeBook(id);
  });
  renderRecommendations();
}

function renderRecommendations(){
  const recGrid = document.getElementById("recGrid");
  recGrid.innerHTML="";
  let recommended = data.sort((a,b)=>b.likes-a.likes).slice(0,4);
  recommended.forEach(b=>{
    let stars=""; for(let s=0;s<b.rating;s++) stars+="⭐";
    const d = document.createElement("div");
    d.className="book";
    d.innerHTML=`
      <img src="${b.img}" alt="${b.t}">
      <span class="price-badge">$${b.p}</span>
      <span class="stars">${stars}</span>
      <div class="book-content">
        <h4>${b.t}</h4>
        <p>${b.desc}</p>
        <button class="add-btn" data-id="${b.id}">Add to Cart</button>
        <button class="like-btn" id="like-${b.id}">❤️ ${b.likes}</button>
      </div>`;
    recGrid.appendChild(d);
  });
  document.querySelectorAll("#recGrid .add-btn").forEach(btn=>{btn.onclick=()=>{const id=parseInt(btn.getAttribute("data-id")); add(data.find(b=>b.id===id));};});
  document.querySelectorAll("#recGrid .like-btn").forEach(btn=>{const id=parseInt(btn.id.split("-")[1]); btn.onclick=()=>likeBook(id);});
}

function likeBook(id){
  const book = data.find(b=>b.id===id);
  book.likes++;
  document.getElementById(`like-${id}`).textContent=`❤️ ${book.likes}`;
  renderRecommendations();
}

function add(book){
  cart.push(book);
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function renderCart(){
  list.innerHTML=""; let sum=0;
  cart.forEach((item,index)=>{
    sum+=item.p;
    const li=document.createElement("li");
    li.innerHTML=`${item.t} - $${item.p} <button onclick="removeCart(${index})">x</button>`;
    list.appendChild(li);
  });
  totalEl.textContent=`Total: $${sum}`;
  cartBtn.textContent=`Cart (${cart.length})`;
}

function removeCart(index){
  cart.splice(index,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function showCheckout(){
  document.getElementById("checkoutBox").style.display="block";
  document.getElementById("checkoutList").innerHTML="";
  cart.forEach(b=>{
    const li=document.createElement("li"); li.textContent=`${b.t} - $${b.p}`;
    document.getElementById("checkoutList").appendChild(li);
  });
  document.getElementById("checkoutTotal").textContent=totalEl.textContent;
}
function closeCheckout(){document.getElementById("checkoutBox").style.display="none";}

document.getElementById("darkToggle").onclick=()=>document.body.classList.toggle("dark");

document.querySelectorAll(".filters button").forEach(btn=>{
  btn.onclick=()=>{
    category=btn.getAttribute("data");
    document.querySelectorAll(".filters button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    render();
  }
});

search.oninput = ()=>render();
cart = JSON.parse(localStorage.getItem("cart"))||[];
renderCart();
render();
</script>
</body>
  </html>
