<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Book Store Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      text-align: center;
    }

    header {
      background-color: #4a90e2;
      color: white;
      padding: 2rem 1rem;
      position: relative;
    }

    .back-link {
      display: block;
      color: white;
      text-decoration: underline;
      margin-bottom: 10px;
    }

    #cart {
      position: absolute;
      top: 20px;
      right: 20px;
      background: #333;
      color: white;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .search-bar, .filters {
      margin: 1rem 0;
    }

    input {
      padding: 0.5rem;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    .filters button {
      margin: 0.3rem;
      padding: 0.5rem;
      border: none;
      border-radius: 5px;
      background: #4a90e2;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .filters button:hover {
      background: #357ABD;
    }

    .filters button.active {
      background: #e94e77;
    }

    .book-card {
      display: inline-block;
      width: 200px;
      margin: 1rem;
      background: white;
      padding: 1rem;
      border-radius: 10px;
      text-align: left;
      cursor: pointer;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .book-card:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    .book-card img {
      width: 100%;
      border-radius: 8px;
    }

    .book-card button {
      width: 100%;
      padding: 0.5rem;
      margin-top: 5px;
      border: none;
      background: #4a90e2;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    .book-card button:hover {
      background: #357ABD;
    }

    #cartItems {
      display: none;
      position: fixed;
      right: 20px;
      top: 80px;
      background: white;
      padding: 1rem;
      border-radius: 10px;
      width: 220px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      text-align: left;
    }

    #bookModal {
      display: none;
      position: fixed;
      top:0; left:0; right:0; bottom:0;
      background: rgba(0,0,0,0.6);
      justify-content: center;
      align-items: center;
    }

    .modal-content {
      background: white;
      padding: 1rem;
      border-radius: 10px;
      max-width: 400px;
    }

    footer {
      background: #333;
      color: white;
      padding: 1rem;
      margin-top: 2rem;
    }

    @media(max-width:600px){
      .book-card { width: 90%; }
    }

  </style>
</head>

<body>

<header>
  <a href="index.html" class="back-link">← Back to Portfolio</a>

  <h1>Book Store Website</h1>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search books...">
  </div>

  <div class="filters">
    <button data-category="All" class="active">All</button>
    <button data-category="Storybook">Storybooks</button>
    <button data-category="Learning">Learning</button>
    <button data-category="Travel">Travel</button>
  </div>

  <button id="cart">Cart (0)</button>
</header>

<section id="bookList"></section>

<div id="cartItems">
  <h3>Your Cart</h3>
  <ul id="cartList"></ul>
  <button onclick="checkout()">Checkout</button>
</div>

<footer>
  <p>© 2026 Fatimah Abubakar</p>
</footer>

<script>
const books = [
  {title:"Cat Adventures", category:"Storybook", price:10, img:"https://picsum.photos/200/300?1"},
  {title:"Learning HTML", category:"Learning", price:12, img:"https://picsum.photos/200/300?2"},
  {title:"Travel Stories", category:"Travel", price:15, img:"https://picsum.photos/200/300?3"},
  {title:"Mystery Novel", category:"Storybook", price:11, img:"https://picsum.photos/200/300?4"},
  {title:"Science for Kids", category:"Learning", price:9, img:"https://picsum.photos/200/300?5"}
];

const bookList = document.getElementById("bookList");
const cartBtn = document.getElementById("cart");
const cartList = document.getElementById("cartList");
const cartItemsDiv = document.getElementById("cartItems");
const searchInput = document.getElementById("searchInput");
const filterButtons = document.querySelectorAll(".filters button");

let cart = JSON.parse(localStorage.getItem("cart")) || [];
let currentCategory = "All";

function renderBooks(){
  const search = searchInput.value.toLowerCase();

  bookList.innerHTML = "";

  books.filter(b =>
    (currentCategory==="All" || b.category===currentCategory) &&
    b.title.toLowerCase().includes(search)
  ).forEach(book=>{
    const card = document.createElement("div");
    card.className="book-card";

    card.innerHTML=`
      <img src="${book.img}">
      <h3>${book.title}</h3>
      <p><strong>$${book.price}</strong></p>
      <button onclick='addToCart(${JSON.stringify(book)})'>Add to Cart</button>
    `;

    bookList.appendChild(card);
  });
}

function addToCart(book){
  cart.push(book);
  saveCart();
  updateCart();
}

function updateCart(){
  cartBtn.textContent = `Cart (${cart.length})`;
  cartList.innerHTML="";

  cart.forEach((b,i)=>{
    const li=document.createElement("li");
    li.innerHTML=`${b.title} <button onclick="removeItem(${i})">x</button>`;
    cartList.appendChild(li);
  });
}

function removeItem(i){
  cart.splice(i,1);
  saveCart();
  updateCart();
}

function saveCart(){
  localStorage.setItem("cart",JSON.stringify(cart));
}

cartBtn.onclick=()=>{
  cartItemsDiv.style.display =
  cartItemsDiv.style.display==="block"?"none":"block";
}

function checkout(){
  if(cart.length===0){
    alert("Cart is empty");
    return;
  }

  const total = cart.reduce((sum,b)=>sum+b.price,0);
  alert("Total: $" + total);

  cart=[];
  saveCart();
  updateCart();
}

filterButtons.forEach(btn=>{
  btn.onclick=()=>{
    filterButtons.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    currentCategory=btn.dataset.category;
    renderBooks();
  }
});

searchInput.addEventListener("input",renderBooks);

renderBooks();
updateCart();
</script>

</body>
  </html>
