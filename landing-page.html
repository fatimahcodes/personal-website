<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fatimah Premium Store</title>

<style>
:root{
  --primary:#232f3e;
  --accent:#ff9900;
  --bg:#f3f3f3;
  --card:#fff;
  --text:#000;
}

.dark{
  --bg:#121212;
  --card:#1e1e1e;
  --text:#fff;
}

body{
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
}

/* HEADER */
header{
  background:var(--primary);
  color:white;
  padding:1rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{margin:0;}

header button{
  background:var(--accent);
  border:none;
  padding:8px 12px;
  cursor:pointer;
}

/* AUTH */
#auth{
  text-align:center;
  margin:20px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:15px;
  padding:15px;
}

.card{
  background:var(--card);
  padding:10px;
  border-radius:10px;
}

.card img{
  width:100%;
  border-radius:10px;
}

/* CART */
#cart{
  position:fixed;
  right:0;
  top:0;
  width:260px;
  height:100%;
  background:white;
  padding:10px;
  overflow:auto;
}

.dark #cart{background:#1e1e1e;}

/* CHECKOUT */
#checkout{
  display:none;
  padding:20px;
}

input,select{
  padding:8px;
  margin:5px;
}
</style>
</head>

<body>

<header>
<h1>🛍️ Fatimah Store</h1>
<div>
<button onclick="toggleTheme()">🌙</button>
<button onclick="showCheckout()">Checkout</button>
</div>
</header>

<!-- AUTH -->
<div id="auth">
<input id="username" placeholder="Enter username">
<button onclick="login()">Login / Signup</button>
<p id="welcome"></p>
</div>

<!-- CART -->
<div id="cart">
<h3>Cart</h3>
<ul id="cartItems"></ul>
<p>Total: $<span id="total">0</span></p>
</div>

<!-- MAIN -->
<div id="main">

<h2 style="text-align:center;">🔥 Top Items</h2>
<div class="grid" id="topGrid"></div>

<h2 style="text-align:center;">✈️ Travel</h2>
<input id="travelSearch" placeholder="Search..." onkeyup="renderAll()">
<select id="travelFilter" onchange="renderAll()">
<option value="all">All</option>
<option value="low">Below 1000</option>
<option value="high">Above 1000</option>
</select>
<div class="grid" id="travelGrid"></div>

<h2 style="text-align:center;">📚 Books</h2>
<input id="bookSearch" placeholder="Search..." onkeyup="renderAll()">
<select id="bookFilter" onchange="renderAll()">
<option value="all">All</option>
<option value="low">Below 18</option>
<option value="high">Above 18</option>
</select>
<div class="grid" id="bookGrid"></div>

</div>

<!-- CHECKOUT PAGE -->
<div id="checkout">
<h2>💳 Checkout</h2>
<p>Total: $<span id="checkoutTotal"></span></p>
<input placeholder="Card Number">
<input placeholder="Expiry Date">
<input placeholder="CVV">
<br>
<button onclick="completePayment()">Pay Now</button>
</div>

<script>

// THEME
function toggleTheme(){
  document.body.classList.toggle("dark");
}

// AUTH
function login(){
  const name=document.getElementById("username").value;
  if(!name) return alert("Enter name");

  localStorage.setItem("user",name);
  document.getElementById("welcome").textContent="Welcome "+name;
}

window.onload=()=>{
  const user=localStorage.getItem("user");
  if(user){
    document.getElementById("welcome").textContent="Welcome "+user;
  }
}

// CART
let cart=JSON.parse(localStorage.getItem("cart"))||[];

function addToCart(name,price){
  cart.push({name,price});
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function renderCart(){
  const list=document.getElementById("cartItems");
  const total=document.getElementById("total");

  list.innerHTML="";
  let sum=0;

  cart.forEach(item=>{
    const li=document.createElement("li");
    li.textContent=item.name+" - $"+item.price;
    list.appendChild(li);
    sum+=item.price;
  });

  total.textContent=sum;
}

// CHECKOUT
function showCheckout(){
  document.getElementById("main").style.display="none";
  document.getElementById("checkout").style.display="block";
  document.getElementById("checkoutTotal").textContent=
    document.getElementById("total").textContent;
}

function completePayment(){
  alert("Payment successful 🎉");
  cart=[];
  localStorage.setItem("cart","[]");
  location.reload();
}

// DATA
const travels=[
{name:"Paris",price:1200,likes:0,img:"images/paris.jpg"},
{name:"Bali",price:900,likes:0,img:"images/bali.jpg"},
{name:"Tokyo",price:1300,likes:0,img:"images/tokyo.jpg"}
];

const books=[
{title:"The Alchemist",price:15,likes:0,img:"images/the-alchemist.jpg"},
{title:"1984",price:12,likes:0,img:"images/1984.jpg"},
{title:"Atomic Habits",price:20,likes:0,img:"images/atomic-habits.jpg"}
];

// RENDER
function renderAll(){

  // TRAVEL
  const tGrid=document.getElementById("travelGrid");
  tGrid.innerHTML="";
  const tSearch=document.getElementById("travelSearch").value.toLowerCase();
  const tFilter=document.getElementById("travelFilter").value;

  travels.filter(t=>t.name.toLowerCase().includes(tSearch))
  .filter(t=>{
    if(tFilter==="low") return t.price<1000;
    if(tFilter==="high") return t.price>=1000;
    return true;
  })
  .forEach((t,i)=>{
    tGrid.innerHTML+=`
    <div class="card">
      <img src="${t.img}">
      <h3>${t.name}</h3>
      <p>$${t.price}</p>
      <button onclick="addToCart('${t.name}',${t.price})">Book</button>
    </div>`;
  });

  // BOOKS
  const bGrid=document.getElementById("bookGrid");
  bGrid.innerHTML="";
  const bSearch=document.getElementById("bookSearch").value.toLowerCase();
  const bFilter=document.getElementById("bookFilter").value;

  books.filter(b=>b.title.toLowerCase().includes(bSearch))
  .filter(b=>{
    if(bFilter==="low") return b.price<18;
    if(bFilter==="high") return b.price>=18;
    return true;
  })
  .forEach((b,i)=>{
    bGrid.innerHTML+=`
    <div class="card">
      <img src="${b.img}">
      <h3>${b.title}</h3>
      <p>$${b.price}</p>
      <button onclick="addToCart('${b.title}',${b.price})">Add</button>
    </div>`;
  });

  // TOP
  const top=document.getElementById("topGrid");
  top.innerHTML="";
  [...travels,...books].slice(0,4).forEach(item=>{
    top.innerHTML+=`
    <div class="card">
      <img src="${item.img}">
    </div>`;
  });
}

renderCart();
renderAll();

</script>

</body>
  </html>
