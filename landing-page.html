<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fatimah Abubakar | Products & Services</title>
<style>
:root {
  --primary: #4a90e2;
  --secondary: #357ab8;
  --bg: #f4f4f4;
  --text: #000;
  --card: #fff;
  --footer-bg: #333;
  --footer-text: #fff;
  --button-hover: #2a65a0;
}

body {
  margin:0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  scroll-behavior: smooth;
}

/* HEADER */
header {
  background: var(--primary);
  color: white;
  padding: 3rem 1rem;
  text-align: center;
}
header h1 { font-size:2.5rem; margin-bottom:1rem; }
header p { font-size:1.2rem; margin-bottom:2rem; }
button {
  padding: 12px 25px;
  font-size: 1rem;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: transform 0.3s, background 0.3s;
}
button:hover { background: var(--button-hover); transform: scale(1.05); }

/* SECTIONS */
section {
  padding: 3rem 1rem;
}
section h2 { font-size:2rem; margin-bottom:1rem; text-align:center; }
section p { font-size:1.1rem; margin-bottom:2rem; text-align:center; }

/* GRID CARDS */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:1.5rem;
  padding:1rem;
}
.card {
  background: var(--card);
  border-radius:10px;
  padding:1rem;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
  position: relative;
}
.card:hover { transform:translateY(-7px); box-shadow:0 8px 20px rgba(0,0,0,0.2); }
.card img {
  width:100%;
  border-radius:10px;
  transition: transform 0.3s;
}
.card img:hover { transform: scale(1.07); }
.card button {
  margin:0.3rem;
  padding:0.5rem 1rem;
  border:none;
  border-radius:5px;
  background: var(--primary);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.card button:hover { opacity:0.85; transform: scale(1.05); }

/* Likes pulse */
.like {
  display:inline-block;
  cursor:pointer;
  transition: transform 0.3s;
}
.like.pulse { animation: pulse 0.4s ease; }
@keyframes pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.5); }
  100% { transform: scale(1); }
}

/* FOOTER */
footer {
  background: var(--footer-bg);
  color: var(--footer-text);
  padding: 2rem 1rem;
  text-align:center;
}
footer a { color:white; text-decoration:none; margin:0 0.5rem; }
footer a:hover { text-decoration:underline; }

/* MOBILE */
@media(max-width:600px){
  .grid { grid-template-columns:1fr; }
  header h1 { font-size:2rem; }
  section h2 { font-size:1.5rem; }
  section p { font-size:1rem; }
}
</style>
</head>
<body>

<header>
  <h1>Fatimah Abubakar | Products & Services</h1>
  <p>Explore Cats, Travel, and Books – All in one page!</p>
</header>

<section id="topLiked">
  <h2>🔥 Top Liked Items</h2>
  <div class="grid" id="topGrid"></div>
</section>

<section id="cats">
  <h2>🐱 Cute Cats Collection</h2>
  <div class="grid" id="catGrid"></div>
</section>

<section id="travel">
  <h2>✈️ Travel Destinations</h2>
  <div class="grid" id="travelGrid"></div>
</section>

<section id="books">
  <h2>📚 Top Books</h2>
  <div class="grid" id="bookGrid"></div>
</section>

<footer>
  <p>© 2026 Fatimah Abubakar | Designed with ❤️ by Fatimah</p>
</footer>

<script>
// ----------------------- CATS -----------------------
let cats = [];
async function fetchCats(){
  try{
    const res = await fetch("https://api.thecatapi.com/v1/images/search?limit=6");
    const data = await res.json();
    cats = data.map((c,i)=>({
      id:i, img:c.url, desc:`Adorable Cat ${i+1}`, price:(Math.floor(Math.random()*15)+5), likes:0
    }));
    renderCats();
    renderTopLiked();
  }catch(e){console.error(e);}
}

function renderCats(){
  const grid = document.getElementById("catGrid");
  grid.innerHTML="";
  cats.forEach(c=>{
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${c.img}" id="catImg-${c.id}">
      <p>${c.desc} - $${c.price}</p>
      <button onclick="changeCat(${c.id})">Change Image</button>
      <button class="like" id="catLike-${c.id}" onclick="likeCat(${c.id})">❤️ <span id="catLikes-${c.id}">${c.likes}</span></button>
      <button>Add to Cart</button>
    `;
    grid.appendChild(card);
  });
}

async function changeCat(id){
  const res = await fetch("https://api.thecatapi.com/v1/images/search");
  const data = await res.json();
  cats[id].img = data[0].url;
  document.getElementById(`catImg-${id}`).src = cats[id].img;
}

function likeCat(id){
  cats[id].likes++;
  const likeBtn = document.getElementById(`catLike-${id}`);
  const likeCount = document.getElementById(`catLikes-${id}`);
  likeCount.textContent = cats[id].likes;
  likeBtn.classList.add('pulse');
  setTimeout(()=>likeBtn.classList.remove('pulse'),400);
  renderTopLiked();
}

// ----------------------- TRAVEL -----------------------
const travels = [
  {name:"Paris, France", desc:"City of lights and love", price:1200, likes:0, img:"https://via.placeholder.com/300x200?text=Paris"},
  {name:"Bali, Indonesia", desc:"Tropical paradise", price:900, likes:0, img:"https://via.placeholder.com/300x200?text=Bali"},
  {name:"Tokyo, Japan", desc:"Modern city with tradition", price:1300, likes:0, img:"https://via.placeholder.com/300x200?text=Tokyo"}
];

function renderTravel(){
  const grid = document.getElementById("travelGrid");
  grid.innerHTML="";
  travels.forEach((t,i)=>{
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${t.img}" id="travelImg-${i}">
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
      <p>Price: $${t.price}</p>
      <button class="like" id="travelLike-${i}" onclick="likeTravel(${i})">❤️ <span id="travelLikes-${i}">${t.likes}</span></button>
      <button>Book Trip</button>
    `;
    grid.appendChild(card);
  });
}

function likeTravel(id){
  travels[id].likes++;
  const likeBtn = document.getElementById(`travelLike-${id}`);
  const likeCount = document.getElementById(`travelLikes-${id}`);
  likeCount.textContent = travels[id].likes;
  likeBtn.classList.add('pulse');
  setTimeout(()=>likeBtn.classList.remove('pulse'),400);
  renderTopLiked();
}

// ----------------------- BOOKS -----------------------
const books = [
  {title:"The Alchemist", desc:"A journey of dreams", price:15, likes:0, img:"https://via.placeholder.com/300x200?text=The+Alchemist"},
  {title:"1984", desc:"Dystopian masterpiece", price:12, likes:0, img:"https://via.placeholder.com/300x200?text=1984"},
  {title:"Atomic Habits", desc:"Tiny changes, remarkable results", price:20, likes:0, img:"https://via.placeholder.com/300x200?text=Atomic+Habits"}
];

function renderBooks(){
  const grid = document.getElementById("bookGrid");
  grid.innerHTML="";
  books.forEach((b,i)=>{
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${b.img}" id="bookImg-${i}">
      <h3>${b.title}</h3>
      <p>${b.desc}</p>
      <p>Price: $${b.price}</p>
      <button class="like" id="bookLike-${i}" onclick="likeBook(${i})">❤️ <span id="bookLikes-${i}">${b.likes}</span></button>
      <button>Add to Cart</button>
    `;
    grid.appendChild(card);
  });
}

function likeBook(id){
  books[id].likes++;
  const likeBtn = document.getElementById(`bookLike-${id}`);
  const likeCount = document.getElementById(`bookLikes-${id}`);
  likeCount.textContent = books[id].likes;
  likeBtn.classList.add('pulse');
  setTimeout(()=>likeBtn.classList.remove('pulse'),400);
  renderTopLiked();
}

// ----------------------- TOP LIKED -----------------------
function renderTopLiked(){
  const topGrid = document.getElementById("topGrid");
  const combined = [
    ...cats.map(c=>({...c, category:"Cat"})),
    ...travels.map(t=>({...t, category:"Travel"})),
    ...books.map(b=>({...b, category:"Book"}))
  ];
  const topItems = combined.sort((a,b)=>b.likes-a.likes).slice(0,6);
  topGrid.innerHTML="";
  topItems.forEach((item,i)=>{
    const card = document.createElement("div");
    card.className="card";
    let title = item.title || item.name || item.desc;
    card.innerHTML=`
      <img src="${item.img}" alt="${title}">
      <h3>${title}</h3>
      <p>${item.category}</p>
      <p>Likes: ${item.likes}</p>
    `;
    topGrid.appendChild(card);
  });
}

// ----------------------- INITIAL RENDER -----------------------
fetchCats();
renderTravel();
renderBooks();
</script>

</body>
  </html>
