<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fatimah Abubakar | Explore Cats, Travel & Books</title>
<style>
:root {
  --primary: #4a90e2;
  --secondary: #357ab8;
  --bg: #f4f4f4;
  --text: #000;
  --card: #fff;
  --footer-bg: #333;
  --footer-text: #fff;
  --button-hover: #2a65a0;
}

body {
  margin:0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  scroll-behavior: smooth;
}

/* HEADER */
header {
  background: var(--primary);
  color: white;
  padding: 3rem 1rem;
  text-align: center;
  position: relative;
}

header h1 { font-size:2.5rem; margin-bottom:1rem; }
header p { font-size:1.2rem; margin-bottom:1.5rem; }

header button {
  margin: 0.3rem;
  padding: 12px 25px;
  font-size: 1rem;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  transition: transform 0.3s, background 0.3s;
}
header button:hover { background: var(--button-hover); transform: scale(1.05); }

/* SECTIONS */
section {
  padding: 3rem 1rem;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
section.visible { opacity:1; transform:translateY(0); }

section h2 { font-size:2rem; margin-bottom:1rem; text-align:center; }
section p { font-size:1.1rem; margin-bottom:2rem; text-align:center; }

/* GRID / CARD */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:1rem;
  padding:1rem;
}
.card {
  background: var(--card);
  border-radius:10px;
  padding:1rem;
  text-align:center;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
}
.card:hover { transform:translateY(-7px); box-shadow:0 8px 20px rgba(0,0,0,0.2); }

.card img {
  width:100%;
  border-radius:10px;
  transition: transform 0.3s;
  cursor:pointer;
}
.card img:hover { transform: scale(1.07); }

.card button {
  margin:0.3rem;
  padding:0.5rem 1rem;
  border:none;
  border-radius:5px;
  background: var(--primary);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.card button:hover { opacity:0.85; transform: scale(1.05); }

/* ❤️ LIKE ANIMATION */
.like {
  display:inline-block;
  cursor:pointer;
  transition: transform 0.3s;
}
.like.pulse {
  transform: scale(1.4);
}

/* FOOTER */
footer {
  background: var(--footer-bg);
  color: var(--footer-text);
  padding: 2rem 1rem;
  text-align:center;
}
footer a { color:white; text-decoration:none; margin:0 0.5rem; }
footer a:hover { text-decoration:underline; }

/* MOBILE */
@media(max-width:600px){
  header h1 { font-size:2rem; }
  section h2 { font-size:1.5rem; }
  section p { font-size:1rem; }
  .grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<header>
  <h1>Explore Cats, Travel & Books</h1>
  <p>Your one-stop interactive landing page for products and experiences.</p>
  <button onclick="scrollToSection('cats')">Shop Cats</button>
  <button onclick="scrollToSection('travel')">Explore Travel</button>
  <button onclick="scrollToSection('books')">Discover Books</button>
  <button id="themeToggle">🌙 Dark Mode</button>
</header>

<!-- CATS SECTION -->
<section id="cats">
  <h2>Adorable Cats</h2>
  <div class="grid" id="catGrid"></div>
</section>

<!-- TRAVEL SECTION -->
<section id="travel">
  <h2>Travel Destinations</h2>
  <div class="grid" id="travelGrid"></div>
</section>

<!-- BOOKS SECTION -->
<section id="books">
  <h2>Recommended Books</h2>
  <div class="grid" id="bookGrid"></div>
</section>

<footer>
  <p>© 2026 Fatimah Abubakar | Designed with ❤️</p>
  <p>Email: <a href="mailto:abubakarfatimah240@gmail.com">abubakarfatimah240@gmail.com</a> | Phone: 08074850779</p>
</footer>

<script>
// Smooth scroll
function scrollToSection(id){
  document.getElementById(id).scrollIntoView({behavior:'smooth'});
}

// Section reveal on scroll
const sections = document.querySelectorAll('section');
window.addEventListener('scroll', checkSections);
function checkSections(){
  const triggerBottom = window.innerHeight * 0.85;
  sections.forEach(sec => {
    const top = sec.getBoundingClientRect().top;
    if(top < triggerBottom) sec.classList.add('visible');
  });
}
checkSections();

// Dark/Light mode toggle
const themeToggle = document.getElementById('themeToggle');
let darkMode = false;
themeToggle.onclick = () => {
  darkMode = !darkMode;
  if(darkMode){
    document.documentElement.style.setProperty('--bg','#121212');
    document.documentElement.style.setProperty('--text','#fff');
    document.documentElement.style.setProperty('--card','#1e1e1e');
    document.documentElement.style.setProperty('--primary','#bb86fc');
    themeToggle.textContent = "☀️ Light Mode";
  } else {
    document.documentElement.style.setProperty('--bg','#f4f4f4');
    document.documentElement.style.setProperty('--text','#000');
    document.documentElement.style.setProperty('--card','#fff');
    document.documentElement.style.setProperty('--primary','#4a90e2');
    themeToggle.textContent = "🌙 Dark Mode";
  }
};

// ---------------------- CATS ----------------------
let cats = [];
async function fetchCats(){
  try{
    const res = await fetch("https://api.thecatapi.com/v1/images/search?limit=6");
    const data = await res.json();
    cats = data.map((c,i)=>({
      id:i, img:c.url, desc:`Adorable Cat ${i+1}`, price:(Math.floor(Math.random()*15)+5), likes:0
    }));
    renderCats();
  }catch(e){ console.error(e); }
}
function renderCats(){
  const grid = document.getElementById('catGrid');
  grid.innerHTML="";
  cats.forEach(c=>{
    const card = document.createElement('div');
    card.className="card";
    card.innerHTML=`
      <img src="${c.img}" id="catImg-${c.id}" onclick="changeCat(${c.id})">
      <p>${c.desc} - $${c.price}</p>
      <span class="like" id="catLike-${c.id}" onclick="likeCat(${c.id})">❤️ <span id="catLikes-${c.id}">${c.likes}</span></span>
      <button onclick="alert('Added to cart!')">Add to Cart</button>
    `;
    grid.appendChild(card);
  });
}
async function changeCat(id){
  const res = await fetch("https://api.thecatapi.com/v1/images/search");
  const data = await res.json();
  cats[id].img = data[0].url;
  document.getElementById(`catImg-${id}`).src = cats[id].img;
}
function likeCat(id){
  cats[id].likes++;
  const likesEl = document.getElementById(`catLikes-${id}`);
  likesEl.textContent = cats[id].likes;
  const heart = document.getElementById(`catLike-${id}`);
  heart.classList.add('pulse');
  setTimeout(()=>heart.classList.remove('pulse'),300);
}
fetchCats();

// ---------------------- TRAVEL ----------------------
const travelDestinations = [
  {name:"Paris, France",desc:"City of lights",price:1200,likes:0,images:["images/paris.jpg","images/paris(1).jpg"],current:0},
  {name:"Bali, Indonesia",desc:"Tropical paradise",price:900,likes:0,images:["images/bali.jpg"],current:0},
  {name:"Tokyo, Japan",desc:"Modern city with tradition",price:1300,likes:0,images:["images/tokyo.jpg"],current:0}
];
function renderTravel(){
  const grid = document.getElementById('travelGrid');
  grid.innerHTML="";
  travelDestinations.forEach((t,i)=>{
    const card = document.createElement('div');
    card.className="card";
    card.innerHTML=`
      <img src="${t.images[t.current]}" id="travelImg-${i}" onclick="changeTravel(${i})">
      <h3>${t.name}</h3>
      <p>${t.desc}</p>
      <p>Price: $${t.price}</p>
      <span class="like" id="travelLike-${i}" onclick="likeTravel(${i})">❤️ <span id="travelLikes-${i}">${t.likes}</span></span>
      <button onclick="alert('Trip booked!')">Book Trip</button>
    `;
    grid.appendChild(card);
  });
}
function changeTravel(i){
  travelDestinations[i].current = (travelDestinations[i].current +1) % travelDestinations[i].images.length;
  document.getElementById(`travelImg-${i}`).src = travelDestinations[i].images[travelDestinations[i].current];
}
function likeTravel(i){
  travelDestinations[i].likes++;
  const likesEl = document.getElementById(`travelLikes-${i}`);
  likesEl.textContent = travelDestinations[i].likes;
  const heart = document.getElementById(`travelLike-${i}`);
  heart.classList.add('pulse');
  setTimeout(()=>heart.classList.remove('pulse'),300);
}
renderTravel();

// ---------------------- BOOKS ----------------------
const books = [
  {title:"The Alchemist",author:"Paulo Coelho",desc:"A journey of self-discovery",price:12,likes:0,img:"images/alchemist.jpg"},
  {title:"1984",author:"George Orwell",desc:"Dystopian classic",price:10,likes:0,img:"images/1984.jpg"},
  {title:"Atomic Habits",author:"James Clear",desc:"Build better habits",price:15,likes:0,img:"images/atomic.jpg"}
];
function renderBooks(){
  const grid = document.getElementById('bookGrid');
  grid.innerHTML="";
  books.forEach((b,i)=>{
    const card = document.createElement('div');
    card.className="card";
    card.innerHTML=`
      <img src="${b.img}" id="bookImg-${i}">
      <h3>${b.title}</h3>
      <p>${b.desc}</p>
      <p>Author: ${b.author}</p>
      <p>Price: $${b.price}</p>
      <span class="like" id="bookLike-${i}" onclick="likeBook(${i})">❤️ <span id="bookLikes-${i}">${b.likes}</span></span>
      <button onclick="alert('Book added to cart!')">Add to Cart</button>
    `;
    grid.appendChild(card);
  });
}
function likeBook(i){
  books[i].likes++;
  const likesEl = document.getElementById(`bookLikes-${i}`);
  likesEl.textContent = books[i].likes;
  const heart = document.getElementById(`bookLike-${i}`);
  heart.classList.add('pulse');
  setTimeout(()=>heart.classList.remove('pulse'),300);
}
renderBooks();
</script>

</body>
</html>
