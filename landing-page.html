<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fatimah Premium Store | Products & Services</title>
<style>
:root {
  --primary:#232f3e;
  --accent:#ff9900;
  --bg:#f3f3f3;
  --card:#fff;
  --text:#000;
  --shadow: rgba(0,0,0,0.1);
}
.dark {
  --bg:#121212;
  --card:#1e1e1e;
  --text:#fff;
  --shadow: rgba(0,0,0,0.5);
}

body { margin:0; font-family:Arial,sans-serif; background:var(--bg); color:var(--text); transition:0.3s; }

/* HEADER */
header {
  background: var(--primary); color:white; padding:1rem 2rem; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;
}
header h1 { margin:0; font-size:1.5rem; }
header .btn { background: var(--accent); border:none; padding:8px 12px; cursor:pointer; margin-left:5px; border-radius:5px; }

/* SEARCH */
#searchBar { text-align:center; margin:15px; }
#searchInput { padding:10px; width:80%; max-width:400px; border-radius:5px; border:1px solid #ccc; }

/* GRID */
.section { padding:10px 20px; }
.section h2 { text-align:center; margin-bottom:15px; }
.grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:20px; }

/* CARD */
.card { background: var(--card); border-radius:10px; overflow:hidden; position:relative; box-shadow:0 4px 15px var(--shadow); transition:0.3s; }
.card:hover { transform: translateY(-5px) scale(1.02); box-shadow:0 8px 20px var(--shadow);}
.card img { width:100%; height:220px; object-fit:cover; display:block; transition:0.3s; }
.card img:hover { transform: scale(1.05);}
.card-content { padding:10px; text-align:center;}
.card h3 { margin:5px 0; font-size:1.1rem;}
.card p { margin:5px 0; font-size:0.85rem;}
.price-badge { position:absolute; top:10px; right:10px; background:var(--accent); color:#000; padding:5px 8px; border-radius:5px; font-weight:bold; }
.stars { position:absolute; bottom:10px; left:10px; background:rgba(255,255,255,0.9); padding:3px 6px; border-radius:5px; font-size:0.9rem; }
.card button { width:90%; margin-top:5px; padding:8px; background:var(--primary); color:white; border:none; border-radius:5px; cursor:pointer; transition:0.2s; }
.card button:hover { opacity:0.85; }

/* CART */
#cart { position:fixed; top:70px; right:10px; width:300px; max-height:80vh; background:var(--card); padding:10px; border-radius:10px; box-shadow:0 4px 20px var(--shadow); overflow-y:auto; display:none; z-index:100; }
#cart h3 { margin-top:0; text-align:center; }
#cart ul { list-style:none; padding:0; margin:0; }
#cart li { margin:5px 0; display:flex; justify-content:space-between; }

/* CHECKOUT */
#checkout { display:none; padding:20px; background:var(--card); max-width:400px; margin:20px auto; border-radius:10px; box-shadow:0 4px 15px var(--shadow); }

/* FOOTER */
footer { background:#333; color:white; text-align:center; padding:10px; margin-top:20px; }

/* RESPONSIVE */
@media(max-width:600px){
  #searchInput { width:90%; }
  header { flex-direction:column; text-align:center; }
  header .btn { margin:5px 0; }
  .grid { grid-template-columns:1fr; }
  #cart { width:90%; top:60px; }
}
</style>
</head>
<body>

<header>
  <h1>🛒 Fatimah Store</h1>
  <div>
    <button class="btn" onclick="toggleTheme()">🌙 Dark</button>
    <button class="btn" onclick="toggleCart()">🛍️ Cart (<span id="cartCount">0</span>)</button>
  </div>
</header>

<div id="searchBar">
  <input type="text" id="searchInput" placeholder="Search items..." oninput="renderAll()">
</div>

<div class="section" id="booksSection">
  <h2>📚 Books</h2>
  <div class="grid" id="bookGrid"></div>
</div>

<div class="section" id="storySection">
  <h2>📖 Storybooks</h2>
  <div class="grid" id="storyGrid"></div>
</div>

<div class="section" id="travelSection">
  <h2>✈️ Travel Trips</h2>
  <div class="grid" id="travelGrid"></div>
</div>

<div class="section" id="recommendSection">
  <h2>⭐ Recommended For You</h2>
  <div class="grid" id="recGrid"></div>
</div>

<!-- CART -->
<div id="cart">
  <h3>Your Cart</h3>
  <ul id="cartList"></ul>
  <p>Total: $<span id="cartTotal">0</span></p>
  <button onclick="checkout()">Checkout 💳</button>
</div>

<!-- CHECKOUT -->
<div id="checkout">
  <h2>💳 Checkout</h2>
  <p>Total: $<span id="checkoutTotal"></span></p>
  <input type="text" id="customerName" placeholder="Name"><br><br>
  <input type="email" id="customerEmail" placeholder="Email"><br><br>
  <button onclick="pay()">Pay Now 💳</button>
  <button onclick="closeCheckout()">Cancel</button>
</div>

<footer>
  <p>© 2026 Fatimah Abubakar</p>
</footer>

<script src="https://js.paystack.co/v1/inline.js"></script>
<script>
// ---------------- DATA ----------------
let booksData = [
  {title:"The Alchemist",price:15,rating:5,img:"images/the-alchemist.jpg",likes:100},
  {title:"1984",price:12,rating:4,img:"images/1984.jpg",likes:90},
  {title:"Atomic Habits",price:20,rating:5,img:"images/atomic-habits.jpg",likes:80}
];

let storyData = [
  {title:"Harry Potter",price:25,rating:5,img:"images/harry-potter.jpg",likes:120},
  {title:"The Hobbit",price:20,rating:5,img:"images/the-hobbit.jpg",likes:75},
  {title:"The Lord of the Rings",price:30,rating:5,img:"images/the-lord-of-the-rings.jpg",likes:110}
];

let travelData = [
  {title:"Paris Trip",price:1200,rating:5,img:"images/paris.jpg",likes:50},
  {title:"Bali Trip",price:900,rating:4,img:"images/bali.jpg",likes:60},
  {title:"Tokyo Trip",price:1300,rating:5,img:"images/tokyo.jpg",likes:40}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// ---------------- FUNCTIONS ----------------
function renderAll(){
  const search = document.getElementById("searchInput").value.toLowerCase();
  renderSection(booksData,"bookGrid",search,"Add to Cart");
  renderSection(storyData,"storyGrid",search,"Add to Cart");
  renderSection(travelData,"travelGrid",search,"Book Trip");
  renderRecommendations();
}

function renderSection(dataArray,gridId,search,btnText){
  const grid = document.getElementById(gridId);
  grid.innerHTML="";
  dataArray.filter(item => item.title.toLowerCase().includes(search))
  .forEach(item=>{
    let stars=""; for(let i=0;i<item.rating;i++) stars+="⭐";
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${item.img}" alt="${item.title}">
      <span class="price-badge">$${item.price}</span>
      <span class="stars">${stars}</span>
      <div class="card-content">
        <h3>${item.title}</h3>
        <button onclick='addToCart("${item.title}",${item.price})'>${btnText}</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function renderRecommendations(){
  const recGrid = document.getElementById("recGrid");
  recGrid.innerHTML="";
  let allItems = [...booksData,...storyData,...travelData];
  let recommended = allItems.sort((a,b)=>b.likes-a.likes).slice(0,4);
  recommended.forEach(item=>{
    let stars=""; for(let i=0;i<item.rating;i++) stars+="⭐";
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${item.img}" alt="${item.title}">
      <span class="price-badge">$${item.price}</span>
      <span class="stars">${stars}</span>
      <div class="card-content">
        <h3>${item.title}</h3>
        <button onclick='addToCart("${item.title}",${item.price})'>Add to Cart</button>
      </div>
    `;
    recGrid.appendChild(card);
  });
}

function addToCart(title,price){
  cart.push({title,price});
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function renderCart(){
  const list = document.getElementById("cartList");
  const totalEl = document.getElementById("cartTotal");
  const countEl = document.getElementById("cartCount");
  list.innerHTML=""; let sum=0;
  cart.forEach((item,index)=>{
    sum+=item.price;
    const li = document.createElement("li");
    li.innerHTML=`${item.title} - $${item.price} <button onclick="removeCart(${index})">x</button>`;
    list.appendChild(li);
  });
  totalEl.textContent=sum; countEl.textContent=cart.length;
}

function removeCart(index){
  cart.splice(index,1);
  localStorage.setItem("cart",JSON.stringify(cart));
  renderCart();
}

function toggleCart(){
  const cartEl = document.getElementById("cart");
  cartEl.style.display = cartEl.style.display==="block"?"none":"block";
}

function checkout(){
  document.getElementById("checkoutTotal").textContent=document.getElementById("cartTotal").textContent;
  document.getElementById("checkout").style.display="block";
}

function closeCheckout(){
  document.getElementById("checkout").style.display="none";
}

function toggleTheme(){ document.body.classList.toggle("dark"); }

function pay(){
  let email = prompt("Enter your email for payment:");
  let amount = parseInt(document.getElementById("checkoutTotal").textContent)*100;
  if(!amount) return alert("Cart is empty!");
  var handler = PaystackPop.setup({
    key: 'YOUR_PUBLIC_KEY',
    email: email,
    amount: amount,
    currency: "NGN",
    callback: function(response){
      alert("Payment Successful! Ref: "+response.reference);
      cart=[]; localStorage.setItem("cart","[]"); renderCart(); closeCheckout();
    },
    onClose: function(){ alert("Payment cancelled"); }
  });
}

// ---------------- INIT ----------------
renderAll(); renderCart();
</script>
</body>
  </html>
