<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fatimah Travel Agency</title>
<style>
:root {
  --bg: #f4f4f4;
  --text: #000;
  --primary: #4caf50;
  --card: #fff;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  text-align: center;
}

header {
  background: var(--primary);
  color: white;
  padding: 2rem 1rem;
}

header h1 { margin: 0 0 0.5rem 0; }
header p { margin: 0.2rem 0; }

section {
  padding: 3rem 1rem;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 1rem;
  padding: 1rem;
}

.card {
  background: var(--card);
  border-radius: 10px;
  padding: 1rem;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: transform 0.3s, box-shadow 0.3s;
  text-align: center;
}

.card:hover {
  transform: translateY(-7px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}

.card img {
  width: 100%;
  height: 180px;
  border-radius: 10px;
  object-fit: cover;
  transition: transform 0.3s;
}

.card img:hover {
  transform: scale(1.05);
}

.card h3 { margin: 0.5rem 0; }
.card p { margin: 0.3rem 0; }
.card button {
  margin: 0.3rem;
  padding: 0.5rem 1rem;
  border: none;
  border-radius: 5px;
  background: var(--primary);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

.card button:hover { opacity: 0.85; transform: scale(1.05); }

footer {
  background: #333;
  color: white;
  padding: 1rem;
}

@media(max-width:600px){
  .grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<header>
  <h1>Fatimah Travel Agency</h1>
  <p>Explore the world with our amazing travel packages!</p>
</header>

<section>
  <div class="grid" id="travelGrid"></div>
</section>

<footer>
  <p>© 2026 Fatimah Abubakar</p>
  <p>Contact: abubakarfatimah240@gmail.com | 08074850779</p>
</footer>

<script>
// Example travel packages
const packages = [
  {title:"Paris Getaway", desc:"Romantic trip to the city of love", price:1200, img:"images/travel-project.jpg"},
  {title:"Safari Adventure", desc:"Explore African wildlife", price:1500, img:"images/travel-project.jpg"},
  {title:"Beach Escape", desc:"Relax on sunny beaches", price:900, img:"images/travel-project.jpg"},
  {title:"Tokyo Explorer", desc:"Discover modern & traditional Japan", price:1300, img:"images/travel-project.jpg"},
  {title:"Alaskan Cruise", desc:"Cruise through icy landscapes", price:2000, img:"images/travel-project.jpg"},
  {title:"London Highlights", desc:"See iconic sights of London", price:1100, img:"images/travel-project.jpg"}
];

const grid = document.getElementById("travelGrid");

packages.forEach((pkg,i)=>{
  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <img src="${pkg.img}" alt="${pkg.title}">
    <h3>${pkg.title}</h3>
    <p>${pkg.desc}</p>
    <p>Price: $${pkg.price}</p>
    <button onclick="alert('Booking ${pkg.title}!')">Book Now</button>
    <button onclick="alert('Explore more about ${pkg.title}!')">Explore</button>
  `;
  grid.appendChild(card);
});
</script>

</body>
</html>
