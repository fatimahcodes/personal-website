<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fatimah Cat Shop</title>
<style>
:root {
  --bg:#f4f4f4;
  --text:#000;
  --card:#fff;
  --primary:#ff6f61;
  --highlight:#ffe066;
}

body {
  margin:0;
  font-family:Arial;
  background:var(--bg);
  color:var(--text);
  transition:0.3s;
}

.dark {
  --bg:#1e1e1e;
  --text:#fff;
  --card:#2c2c2c;
}

header {
  background:var(--primary);
  color:white;
  text-align:center;
  padding:2rem 1rem;
  position:sticky;
  top:0;
  z-index:100;
}

header h1 { margin:0 0 0.5rem 0; }
header p { margin:0.2rem 0; }

input {
  padding:0.5rem;
  width:200px;
  border-radius:5px;
  border:none;
  margin-top:0.5rem;
}

.filters button {
  margin:0.5rem 0.2rem;
  padding:0.5rem 1rem;
  border:none;
  border-radius:5px;
  background:var(--primary);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.filters button.active { background:#e94e77; }
.filters button:hover { transform:scale(1.05); }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:1rem;
  padding:1rem;
}

.card {
  background:var(--card);
  border-radius:10px;
  padding:1rem;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
  text-align:center;
  transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
  opacity:0;
  transform: translateY(20px);
}
.card.show { opacity:1; transform: translateY(0); }

.card:hover {
  transform: translateY(-7px);
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
}

.card img {
  width:100%;
  border-radius:10px;
  transition: transform 0.3s;
}
.card img:hover { transform:scale(1.07); }

.card button {
  margin:0.3rem;
  padding:0.5rem 1rem;
  border:none;
  border-radius:5px;
  background:var(--primary);
  color:white;
  cursor:pointer;
  transition:0.3s;
}
.card button:hover { opacity:0.85; transform:scale(1.05); }

#cartBox, #checkoutBox {
  position:fixed;
  right:10px;
  top:100px;
  width:320px;
  background:var(--card);
  padding:1rem;
  display:none;
  border-radius:10px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  max-height:80vh;
  overflow-y:auto;
  z-index:200;
}

#darkToggle {
  position:absolute;
  left:15px;
  top:15px;
  cursor:pointer;
  padding:0.3rem 0.6rem;
  border:none;
  border-radius:5px;
  background:white;
  color:var(--primary);
}

footer {
  background:#333;
  color:white;
  padding:1rem;
  text-align:center;
}

@media(max-width:600px){
  .grid { grid-template-columns:1fr; }
  #cartBox, #checkoutBox { width:90%; top:70px; }
}
</style>
</head>
<body>

<header>
  <button id="darkToggle">🌙</button>
  <h1>Fatimah Cat Shop</h1>
  <p>Interactive mini cat shop - adorable cats!</p>
  <p>Contact: 08074850779 | Email: abubakarfatimah240@gmail.com</p>

  <input id="search" placeholder="Search cats...">

  <div class="filters">
    <button data="All" class="active">All</button>
    <button data="Kitten">Kitten</button>
    <button data="Adult">Adult</button>
    <button data="Long Hair">Long Hair</button>
    <button data="Short Hair">Short Hair</button>
  </div>

  <button id="cartBtn">Cart (0)</button>
</header>

<div class="grid" id="catGrid"></div>

<div id="cartBox">
<h3>Your Cart</h3>
<ul id="cartList"></ul>
<p id="cartTotal"></p>
<button onclick="showCheckout()">Proceed to Checkout</button>
</div>

<div id="checkoutBox">
<h3>Checkout</h3>
<form id="checkoutForm">
  <label>Name:</label><br>
  <input type="text" id="customerName" required><br>
  <label>Email:</label><br>
  <input type="email" id="customerEmail" required><br>
  <label>Phone:</label><br>
  <input type="tel" id="customerPhone" required><br><br>
  <h4>Order Summary</h4>
  <ul id="checkoutList"></ul>
  <p id="checkoutTotal"></p>
  <button type="submit">Place Order</button>
  <button type="button" onclick="closeCheckout()">Cancel</button>
</form>
</div>

<footer>
<p>© 2026 Fatimah Abubakar</p>
</footer>

<script>
let cats = [];
let cart = JSON.parse(localStorage.getItem("cart"))||[];
let likesData = JSON.parse(localStorage.getItem("likes"))||{};
const catGrid = document.getElementById("catGrid");
const search = document.getElementById("search");
const cartList = document.getElementById("cartList");
const cartTotal = document.getElementById("cartTotal");
const cartBtn = document.getElementById("cartBtn");
const checkoutBox = document.getElementById("checkoutBox");
let category = "All";

// Dark Mode
const darkToggle = document.getElementById("darkToggle");
darkToggle.onclick = ()=>{
  document.body.classList.toggle("dark");
  localStorage.setItem("theme",document.body.classList.contains("dark"));
};
if(localStorage.getItem("theme")==="true") document.body.classList.add("dark");

function getRandomType() {
  const types = ["Kitten","Adult","Long Hair","Short Hair"];
  return types[Math.floor(Math.random()*types.length)];
}
function getRandomPrice() {
  return (Math.floor(Math.random()*15)+5);
}

// Fetch 20 cat images
async function fetchCats() {
  try {
    const res = await fetch("https://api.thecatapi.com/v1/images/search?limit=20");
    const data = await res.json();
    cats = data.map((c,i)=>({
      id:i,
      img:c.url,
      desc:`Adorable cat ${i+1}`,
      type:getRandomType(),
      price:getRandomPrice(),
      likes:likesData[i]||0
    }));
    renderCats();
    updateCart();
  } catch(err) {
    catGrid.innerHTML="<p>Failed to load cats.</p>";
    console.error(err);
  }
}

function renderCats() {
  catGrid.innerHTML="";
  cats.filter(cat=>(category==="All"||cat.type===category)
    && cat.desc.toLowerCase().includes(search.value.toLowerCase())
  ).forEach(cat=>{
    const card = document.createElement("div");
    card.className="card";
    card.innerHTML=`
      <img src="${cat.img}" id="catImg-${cat.id}">
      <p id="desc-${cat.id}">${cat.desc} (${cat.type}) - $${cat.price}</p>
      <button onclick="changeCat(${cat.id})">Change Cat Image</button>
      <button onclick="likeCat(${cat.id})">❤️ Like (<span id="likes-${cat.id}">${cat.likes}</span>)</button>
      <button onclick="addToCart(${cat.id})">Add to Cart</button>
    `;
    catGrid.appendChild(card);
    setTimeout(()=>card.classList.add("show"),50); // animation
  });
}

async function changeCat(id){
  try{
    const res = await fetch("https://api.thecatapi.com/v1/images/search");
    const data = await res.json();
    cats[id].img = data[0].url;
    cats[id].desc = `A new adorable cat appears!`;
    cats[id].price = getRandomPrice();
    document.getElementById(`catImg-${id}`).src = cats[id].img;
    document.getElementById(`desc-${id}`).textContent = `${cats[id].desc} (${cats[id].type}) - $${cats[id].price}`;
  }catch(err){console.error(err);}
}

function likeCat(id){
  cats[id].likes++;
  likesData[id] = cats[id].likes;
  localStorage.setItem("likes",JSON.stringify(likesData));
  document.getElementById(`likes-${id}`).textContent=cats[id].likes;
}

function addToCart(id){
  let found = cart.find(c=>c.id===id);
  if(found){found.qty++;}
  else{cart.push({...cats[id], qty:1});}
  localStorage.setItem("cart",JSON.stringify(cart));
  updateCart();
}

function updateCart(){
  cartList.innerHTML="";
  let total=0;
  cart.forEach((c,i)=>{
    total+=c.qty*c.price;
    let li=document.createElement("li");
    li.innerHTML=`${c.desc} x${c.qty} - $${c.price*c.qty} <button onclick="removeCart(${i})">x</button>`;
    cartList.appendChild(li);
  });
  cartTotal.textContent="Total: $"+total;
  cartBtn.textContent=`Cart (${cart.length})`;
}

function removeCart(i){ cart.splice(i,1); localStorage.setItem("cart",JSON.stringify(cart)); updateCart(); }

function showCheckout(){
  if(cart.length===0) return alert("Cart is empty");
  document.getElementById("checkoutList").innerHTML="";
  let total=0;
  cart.forEach(c=>{
    total+=c.qty*c.price;
    const li = document.createElement("li");
    li.textContent=`${c.desc} x${c.qty} - $${c.price*c.qty}`;
    document.getElementById("checkoutList").appendChild(li);
  });
  document.getElementById("checkoutTotal").textContent="Total: $"+total;
  checkoutBox.style.display="block";
}

function closeCheckout(){ checkoutBox.style.display="none"; }

document.getElementById("checkoutForm").onsubmit=function(e){
  e.preventDefault();
  alert("Order placed successfully 🎉\nThank you, "+document.getElementById("customerName").value+"!");
  cart=[];
  localStorage.setItem("cart",JSON.stringify(cart));
  updateCart();
  closeCheckout();
};

document.querySelectorAll(".filters button").forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll(".filters button").forEach(x=>x.classList.remove("active"));
    b.classList.add("active");
    category=b.getAttribute("data");
    renderCats();
  };
});

search.oninput=renderCats;

cartBtn.onclick=()=>{
  const box = document.getElementById("cartBox");
  box.style.display = box.style.display==="block"?"none":"block";
}

fetchCats();
</script>
</body>
    </html>
